openapi: 3.0.3
info:
  title: Smart Event Registration Service API
  description: Handles event registrations, bookings and cancellations
  version: 1.0.0

servers:
  - url: http://localhost:3003/api
    description: Local development
  - url: https://registration.yourdomain.com/api
    description: Production (update later)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /registrations:
    post:
      summary: Book a ticket for an event
      description: Creates a registration after checking event availability
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventId, ticketCount]
              properties:
                eventId: { type: string, example: "67a123b456c789d012e345f6" }
                ticketCount: { type: integer, minimum: 1, maximum: 10, example: 2 }
                notes: { type: string, maxLength: 500, example: "Two adults" }
      responses:
        '201':
          description: Booking created
        '400':
          description: Invalid input or no capacity
        '401':
          description: Unauthorized
        '409':
          description: Already booked (optional check)

  /registrations/my-bookings:
    get:
      summary: Get current user's bookings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of bookings

  /registrations/event/{eventId}:
    get:
      summary: Get participants of an event
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: List of participants

  /registrations/{id}:
    delete:
      summary: Cancel a booking (own only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Cancelled
        '403':
          description: Not your booking
        '404':
          description: Not found

  /health:
    get:
      summary: Service health check
      responses:
        '200':
          description: OK