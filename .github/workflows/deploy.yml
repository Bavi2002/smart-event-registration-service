name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:

  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.organization=bavi2002
            -Dsonar.projectKey=Bavi2002_smart-event-registration-service
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-push:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: sonarcloud   

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::503561435040:role/github-actions-ecr-push-role
          aws-region: us-east-1
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/smart-event-registration:${{ github.sha }},${{ steps.login-ecr.outputs.registry }}/smart-event-registration:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster smart-event-cluster \
            --service smart-event-registration-task-service-4b4yv8rr \
            --force-new-deployment

      - name: Image digest
        run: echo "Pushed image digest for smart-event-registration:${{ github.sha }}"