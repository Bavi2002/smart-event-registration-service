name: Build & Push to AWS ECR

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::503561435040:role/github-actions-ecr-push-role
          aws-region: us-east-1
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/smart-event-registration:${{ github.sha }}, ${{ steps.login-ecr.outputs.registry }}/smart-event-registration:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ✅ FIXED ECS DEPLOY STEP
      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster smart-event-cluster \
            --service smart-event-registration-task-service-4b4yv8rr  \
            --force-new-deployment

      - name: Image digest
        run: echo "Pushed image digest for smart-event-registration:${{ github.sha }}"