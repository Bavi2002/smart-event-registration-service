openapi: 3.0.3

info:
  title: Smart Event Registration Service API
  description: Handles event registrations, bookings, cancellations, and event participation
  version: 1.0.0

servers:
  - url: http://localhost:3003/api
    description: Local development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Registration:
      type: object
      properties:
        id:
          type: string
          example: "64f1c2a9b1c9d8e7a1234567"
        eventId:
          type: string
          example: "67a123b456c789d012e345f6"
        userId:
          type: string
          example: "64f1c2a9b1c9d8e7a9876543"
        ticketCount:
          type: integer
          example: 2
        status:
          type: string
          example: "confirmed"
        createdAt:
          type: string
          format: date-time

paths:

  /registrations:
    post:
      summary: Create a new booking
      description: Book tickets for an event after checking availability
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - eventId
                - ticketCount
              properties:
                eventId:
                  type: string
                  example: "67a123b456c789d012e345f6"
                ticketCount:
                  type: integer
                  minimum: 1
                  maximum: 10
                  example: 2
                notes:
                  type: string
                  example: "Two seats needed"
      responses:
        "201":
          description: Booking created successfully
        "400":
          description: Invalid input or insufficient seats
        "401":
          description: Unauthorized
        "409":
          description: Already booked

  /registrations/my-bookings:
    get:
      summary: Get my bookings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of user bookings

  /registrations/event/{eventId}:
    get:
      summary: Get event participants
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of participants

  /registrations/{id}:
    delete:
      summary: Cancel a booking
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booking cancelled
        "403":
          description: Not authorized
        "404":
          description: Not found

  /health:
    get:
      summary: Service health check
      responses:
        "200":
          description: Service is running